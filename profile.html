{% extends 'base.html' %}

<div class="card">

    <p>Tên định danh tài khoản: <b>{{ session.get('username') }}</b></p>
    <p>Cấp bậc quyền hạn phân bổ: <span class="badge badge-aes">{{ session.get('role', '').upper() }}</span></p>
</div>
{% endblock %}
